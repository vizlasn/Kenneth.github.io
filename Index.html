<!DOCTYPE html>
<html lang="en">
  <head>
    <title>kenneth calculator V2</title>
    <style>
      body{
        text-align:center;
        font-family:Arial;
        background-color:#f5f5f5;
        padding:20px;
      }
      h1{color:#333}
      input{
        padding:10px;
        font-size:18px;
        margin:5px;
        width:120px;
        border:2px solid #333;
        border-radius:8px;
        text-align:center;
      }
      button{
        padding:12px 20px;
        font-size:18px;
        margin:5px;
        border:none;
        border-radius:8px;
        cursor:pointer;
        font-weight:bold;
      }
      .add{background:#4CAF50;color:white}
      .sub{background:#f44336;color:white}
      .mul{background:#FF9800;color:white}
      .div{background:#2196F3;color:white}
      #jibu{
        margin-top:20px;
        font-size:28px;
        font-weight:bold;
        color:#000;
        background:white;
        padding:15px;
        border-radius:8px;
        display:inline-block;
        min-width:200px;
      }
    </style>
  </head>
  <body>
    <h1>KENNETH CALCULATOR</h1>
    <p>natoka litein</p>
    <input type="number"id="num1" placeholder="Namb 1">
    <input type="number"id="num2" placeholder="Namba2">
    <br>
    <button class="add" onclick="hesabu('+')">+</button>
    <button class="sub" onclick="hesabu('-')">-</button>
    <button class="mul" onclick="hesabu('×')">×</button>
    <button class="div" onclick="hesabu('÷')">÷</button>
    <div id="jibu">jibu:0</div>
    <script>
    function hesabu(alama){
    let n1=parseFloat(document.getElementById('num1').value);
    let n2=parseFloat(document.getElementById('num2').value);
    let result=0;
    if(isNaN(n1)|| isNaN(n2)){
    document.getElementById('jibu').innerText="weka namba zote!";
    return;
    }
    if(alama=='+')result=n1+n2;
    if(alama=='-')result=n1-n2;
    if(alama=='×')result=n1*n2;
    if(alama=='÷'){
    if(n2==0){
    document.getElementById('jibu').innerText="Huwezi divide na 0!";
    return;
    }
    result=n1/n2;
    }
    document.getElementById('jibu').innerText="jibu:"+result;
    }
    </script>
</body>
</html>
