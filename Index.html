<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kenneth's Deriv Trading Site</title>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      background: #0e0e0e; 
      color: #fff; 
      display: flex; 
      justify-content: center; 
      align-items: center; 
      height: 100vh; 
      margin: 0;
    }
    .card { 
      background: #181818; 
      padding: 2rem; 
      border-radius: 12px; 
      width: 360px; 
      text-align: center;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .price { 
      font-size: 2.5rem; 
      font-weight: bold; 
      margin: 1rem 0; 
      color: #ff444f;
    }
    .symbol { color: #888; margin-bottom: 0.5rem; }
    button { 
      width: 48%; 
      padding: 12px; 
      margin: 4px 1%; 
      border: none; 
      border-radius: 8px; 
      font-weight: bold; 
      cursor: pointer;
      font-size: 1rem;
    }
    .buy { background: #00d0b0; color: #000; }
    .sell { background: #ff444f; color: #fff; }
    .status { margin-top: 1rem; font-size: 0.9rem; color: #888; }
    input, select {
      width: 100%;
      padding: 8px;
      margin: 8px 0;
      background: #2a2a2a;
      border: 1px solid #333;
      color: #fff;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Hey Kenneth 👋</h2>
    <div class="symbol">Volatility 75 Index</div>
    <div class="price" id="price">--</div>
    
    <select id="symbol">
      <option value="R_75">Volatility 75 Index</option>
      <option value="R_100">Volatility 100 Index</option>
      <option value="1HZ100V">Volatility 100 (1s) Index</option>
    </select>
    
    <input type="number" id="stake" placeholder="Stake amount" value="1" min="0.35">
    
    <div>
      <button class="buy" onclick="trade('CALL')">Rise</button>
      <button class="sell" onclick="trade('PUT')">Fall</button>
    </div>
    
    <div class="status" id="status">Connecting to Deriv API...</div>
  </div>

  <script>
    const APP_ID = 1089; // Public test app_id. Replace with yours from app.deriv.com
    const socket = new WebSocket(`wss://ws.binaryws.com/websockets/v3?app_id=${APP_ID}`);
    let currentSymbol = 'R_75';
    let currentPrice = 0;

    socket.onopen = () => {
      document.getElementById('status').innerText = 'Connected';
      subscribeTicks();
    };

    socket.onmessage = (msg) => {
      const data = JSON.parse(msg.data);
      
      if (data.tick) {
        currentPrice = data.tick.quote;
        document.getElementById('price').innerText = currentPrice.toFixed(2);
      }
      
      if (data.error) {
        document.getElementById('status').innerText = `Error: ${data.error.message}`;
      }
      
      if (data.buy) {
        document.getElementById('status').innerText = `Trade placed: ${data.buy.contract_id}`;
      }
    };

    function subscribeTicks() {
      socket.send(JSON.stringify({ 
        ticks: currentSymbol, 
        subscribe: 1 
      }));
    }

    document.getElementById('symbol').onchange = (e) => {
      socket.send(JSON.stringify({ forget_all: 'ticks' }));
      currentSymbol = e.target.value;
      subscribeTicks();
      document.getElementById('price').innerText = '--';
    };

    function trade(contract_type) {
      const stake = parseFloat(document.getElementById('stake').value);
      if (!stake || stake < 0.35) {
        document.getElementById('status').innerText = 'Min stake is 0.35 USD';
        return;
      }
      
      document.getElementById('status').innerText = 'Placing trade...';
      
      // NOTE: This is a demo. Real trading needs OAuth token + proposal first
      // For demo only - won't actually buy without API token
      socket.send(JSON.stringify({
        buy: 1,
        price: stake,
        parameters: {
          amount: stake,
          basis: 'stake',
          contract_type: contract_type,
          currency: 'USD',
          duration: 5,
          duration_unit: 't',
          symbol: currentSymbol
        }
      }));
    }
  </script>
</body>
</html>
